<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oneteam - Modern Workspace Management</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- jEasyUI CSS -->
    <link rel="stylesheet" type="text/css" href="https://www.jeasyui.com/easyui/themes/default/easyui.css">
    <link rel="stylesheet" type="text/css" href="https://www.jeasyui.com/easyui/themes/icon.css">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="frontend/assets/css/app.css" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <h4 class="mt-3">Loading Oneteam...</h4>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen d-none">
        <div class="container-fluid h-100">
            <div class="row h-100 justify-content-center align-items-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card shadow-lg">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <h1 class="h3 mb-3 fw-normal">
                                    <i class="fas fa-users text-primary"></i>
                                    Oneteam
                                </h1>
                                <p class="text-muted">Sign in to your workspace</p>
                            </div>
                            
                            <form id="login-form">
                                <div class="mb-3">
                                    <label for="username" class="form-label">Username</label>
                                    <input type="text" class="form-control" id="username" name="username" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>
                                
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                    <label class="form-check-label" for="remember">
                                        Remember me
                                    </label>
                                </div>
                                
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="fas fa-sign-in-alt me-2"></i>
                                        Sign In
                                    </button>
                                </div>
                            </form>
                            
                            <div id="login-error" class="alert alert-danger mt-3 d-none" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                <span id="login-error-message"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <!-- Main Application -->
    <div id="main-app" class="main-app d-none">
        <!-- Top Navigation -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <i class="fas fa-users me-2"></i>
                    Oneteam
                </a>
                
                <!-- Workspace Selector -->
                <div class="navbar-nav me-auto">
                    <div class="nav-item custom-dropdown">
                        <a class="nav-link custom-dropdown-trigger workspace-dropdown-trigger" href="#" id="workspaceDropdown" 
                           data-custom-dropdown="workspace-dropdown-menu">
                            <i id="current-workspace-icon" class="fas fa-briefcase me-2"></i>
                            <span id="current-workspace-name">Select Workspace</span>
                            <i class="fas fa-chevron-down ms-2" style="font-size: 0.75rem;"></i>
                        </a>
                        <ul class="custom-dropdown-menu workspace-dropdown-menu" id="workspace-dropdown-menu">
                            <li class="dropdown-header">Available Workspaces</li>
                            <!-- Workspaces will be loaded here -->
                        </ul>
                    </div>
                </div>
                
                <div class="navbar-nav ms-auto">
                    <div class="nav-item custom-dropdown">
                        <a class="nav-link custom-dropdown-trigger" href="#" id="userDropdown" 
                           data-custom-dropdown="user-dropdown-menu">
                            <i class="fas fa-user-circle me-2"></i>
                            <span id="current-user-name">User</span>
                            <i class="fas fa-chevron-down ms-2" style="font-size: 0.75rem;"></i>
                        </a>
                        <ul class="custom-dropdown-menu dropdown-menu-end" id="user-dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="App.showProfile()">
                                <i class="fas fa-user me-2"></i>Profile
                            </a></li>
                            <li><a class="dropdown-item" href="#" onclick="App.showSettings()">
                                <i class="fas fa-cog me-2"></i>Settings
                            </a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="Auth.handleLogout()">
                                <i class="fas fa-sign-out-alt me-2"></i>Sign Out
                            </a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Layout -->
        <div class="container-fluid p-0 main-container">
            <div class="row g-0 h-100">
                <!-- Sidebar -->
                <div class="col-auto sidebar-container">
                    <div id="sidebar" class="sidebar">
                        <div class="sidebar-header">
                            <h6 class="mb-0">
                                <i class="fas fa-bars me-2"></i>
                                <span>Navigation</span>
                            </h6>
                            <button class="btn btn-sm btn-outline-light sidebar-toggle" onclick="App.toggleSidebar()">
                                <i class="fas fa-bars"></i>
                            </button>
                        </div>
                        
                        <div class="sidebar-content">
                            <nav id="main-menu" class="nav flex-column">
                                <!-- Menu items will be loaded here -->
                            </nav>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col main-content">
                    <div id="content-area" class="content-area">
                        <div class="welcome-message text-center">
                            <h3><i class="fas fa-home me-2"></i>Welcome to Oneteam</h3>
                            <p class="text-muted">Select a menu item to get started</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jEasyUI JS -->
    <script type="text/javascript" src="https://www.jeasyui.com/easyui/jquery.easyui.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="frontend/assets/js/config.js"></script>
    <script src="frontend/assets/js/utils.js"></script>
    <script src="frontend/assets/js/custom-dropdown.js"></script>
    <script src="frontend/assets/js/auth.js"></script>
    <script src="frontend/assets/js/workspace.js"></script>
    <script src="frontend/assets/js/menu.js"></script>
    <script src="frontend/assets/js/app.js"></script>
    
    <script>
        // Initialize application
        $(document).ready(function() {
            App.init();
        });
    </script>
</body>
</html>
